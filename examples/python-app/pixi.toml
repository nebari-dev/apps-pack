[workspace]
name = "python-app"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]

[dependencies]
python = "3.12.*"
streamlit = ">=1.44"

[tasks]
# The platform runs `pixi run start` and expects a server on 0.0.0.0:8080.
start = "streamlit run app.py --server.address 0.0.0.0 --server.port 8080 --server.headless true"
