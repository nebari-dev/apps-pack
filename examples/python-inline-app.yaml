# A public Python app launched from a pixi task. runtime.pixiTask switches the
# workload from nginx static serving to the pixi runtime: the operator copies
# the source into a writable workspace, runs `pixi install`, then
# `pixi run start`. The task must listen on 0.0.0.0:8080 (PORT is injected).
apiVersion: apps.nebari.dev/v1alpha1
kind: App
metadata:
  name: hello-python
spec:
  displayName: "Hello Python"
  description: "A tiny pixi-launched Python service"
  runtime:
    pixiTask: start
  source:
    type: inline
    inline:
      files:
        pixi.toml: |
          [project]
          name = "hello-python"
          channels = ["conda-forge"]
          platforms = ["linux-64", "linux-aarch64"]

          [dependencies]
          python = "3.12.*"

          [tasks]
          start = "python server.py"
        server.py: |
          import os
          from http.server import BaseHTTPRequestHandler, HTTPServer

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  self.send_response(200)
                  self.send_header("Content-Type", "text/plain")
                  self.end_headers()
                  self.wfile.write(b"Hello from a pixi-launched Python app\n")

          port = int(os.environ.get("PORT", "8080"))
          HTTPServer(("0.0.0.0", port), Handler).serve_forever()
  access:
    public: true
    subdomain: hello-python
