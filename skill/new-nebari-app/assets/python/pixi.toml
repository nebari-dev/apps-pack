[project]
name = "APP_NAME"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]

[dependencies]
python = "3.12.*"
fastapi = "*"
uvicorn = "*"

[tasks]
# The platform injects PORT=8080 and expects the task to serve on 0.0.0.0.
start = "uvicorn app:app --host 0.0.0.0 --port 8080"
