# Launch manifest for the Nebari Apps Pack.
# Build + push the image first (see Dockerfile), then say "launch it" to a
# coding agent connected to the nebari-apps MCP server.
name: APP_NAME
namespace: apps
displayName: "APP_DISPLAY_NAME"
framework: fastapi
source:
  type: image
  image:
    repository: REGISTRY/APP_NAME    # e.g. quay.io/org/APP_NAME
    tag: v1
runtime:
  replicas: 1
access:
  public: false
  groups: []           # empty = any signed-in user
  subdomain: APP_NAME
