{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nebari-apps.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-apps.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      {{- include "nebari-apps.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "nebari-apps.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ui
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          env:
            # nginx proxies /api/ to apps-api and /mcp to apps-mcp
            # (same-origin, no CORS; one hostname for the whole platform).
            - name: API_URL
              value: http://{{ include "nebari-apps.fullname" . }}-api.{{ .Release.Namespace }}.svc.cluster.local:8080
            - name: MCP_URL
              {{- if .Values.mcp.enabled }}
              value: http://{{ include "nebari-apps.fullname" . }}-mcp.{{ .Release.Namespace }}.svc.cluster.local:8080
              {{- else }}
              # Point at apps-api (always present) so nginx can resolve the
              # upstream at startup; /mcp then 404s cleanly.
              value: http://{{ include "nebari-apps.fullname" . }}-api.{{ .Release.Namespace }}.svc.cluster.local:8080
              {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nebari-apps.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-apps.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "nebari-apps.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ui
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
# Exposes the UI at https://<appsDomain> (launched apps live one level below,
# at https://<subdomain>.<appsDomain>). The UI handles login itself with
# keycloak-js against the SPA client this NebariApp provisions, so gateway
# enforcement is off (app-native auth); launched apps, by contrast, are
# gateway-enforced by their own NebariApps.
apiVersion: reconcilers.nebari.dev/v1
kind: NebariApp
metadata:
  name: {{ include "nebari-apps.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-apps.labels" . | nindent 4 }}
spec:
  hostname: {{ .Values.ui.hostname | default (include "nebari-apps.appsDomain" .) }}
  service:
    name: {{ include "nebari-apps.fullname" . }}-ui
    port: 8080
  routing:
    routes:
      - pathPrefix: /
        pathType: PathPrefix
    tls:
      enabled: {{ .Values.tls.enabled }}
  {{- if .Values.api.auth.enabled }}
  auth:
    enabled: true
    provider: keycloak
    provisionClient: true
    enforceAtGateway: false
    redirectURI: /*
    scopes:
      - openid
      - profile
      - email
      - groups
    # Browser logins (keycloak-js PKCE in the UI).
    spaClient:
      enabled: true
    {{- if .Values.mcp.enabled }}
    # CLI/agent logins for the MCP endpoint at /mcp (RFC 8628 device grant).
    deviceFlowClient:
      enabled: true
    {{- end }}
  {{- else }}
  auth:
    enabled: false
  {{- end }}
  gateway: {{ .Values.gateway }}
  landingPage:
    enabled: true
    displayName: Apps
    description: Launch and manage web applications on this cluster.
    category: Platform
    # files/icon.svg is a copy of assets/icon.svg (Helm can only read files
    # inside the chart); embedded as a data URI so no extra hosting is needed.
    icon: data:image/svg+xml;base64,{{ .Files.Get "files/icon.svg" | b64enc }}
    {{- with .Values.ui.landingPage.healthCheck }}
    {{- if .enabled }}
    healthCheck:
      enabled: true
      path: {{ .path | quote }}
      intervalSeconds: {{ .intervalSeconds }}
      timeoutSeconds: {{ .timeoutSeconds }}
    {{- end }}
    {{- end }}
{{- end }}
