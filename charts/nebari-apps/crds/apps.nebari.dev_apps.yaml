---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: apps.apps.nebari.dev
spec:
  group: apps.nebari.dev
  names:
    kind: App
    listKind: AppList
    plural: apps
    singular: app
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.framework
      name: Framework
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.url
      name: URL
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: App is a web application launched and managed on a Nebari cluster.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AppSpec defines the desired state of an App.
            properties:
              access:
                description: AppAccess configures who can reach the app and at which
                  subdomain.
                properties:
                  groups:
                    description: Groups are the Keycloak/OIDC groups allowed to use
                      the app.
                    items:
                      type: string
                    type: array
                  public:
                    description: Public disables authentication entirely (anonymous
                      access).
                    type: boolean
                  subdomain:
                    description: 'Subdomain under the cluster domain: https://<subdomain>.<clusterDomain>.'
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                  users:
                    description: Users are additional individual users allowed to
                      use the app.
                    items:
                      type: string
                    type: array
                required:
                - subdomain
                type: object
              description:
                maxLength: 256
                type: string
              displayName:
                maxLength: 64
                minLength: 1
                type: string
              framework:
                description: Framework identifies how an app is launched and served.
                enum:
                - static
                - streamlit
                - panel
                - gradio
                - dash
                - voila
                - fastapi
                - custom
                type: string
              owner:
                description: Owner is the Keycloak sub / preferred_username that manages
                  the app.
                type: string
              runtime:
                description: AppRuntime configures how the app process runs.
                properties:
                  command:
                    description: |-
                      Command overrides the framework-derived container command.
                      Required for framework=custom.
                    items:
                      type: string
                    type: array
                  env:
                    items:
                      description: EnvVar represents an environment variable present
                        in a Container.
                      properties:
                        name:
                          description: |-
                            Name of the environment variable.
                            May consist of any printable ASCII characters except '='.
                          type: string
                        value:
                          description: |-
                            Variable references $(VAR_NAME) are expanded
                            using the previously defined environment variables in the container and
                            any service environment variables. If a variable cannot be resolved,
                            the reference in the input string will be unchanged. Double $$ are reduced
                            to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                            "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                            Escaped references will never be expanded, regardless of whether the variable
                            exists or not.
                            Defaults to "".
                          type: string
                        valueFrom:
                          description: Source for the environment variable's value.
                            Cannot be used if value is not empty.
                          properties:
                            configMapKeyRef:
                              description: Selects a key of a ConfigMap.
                              properties:
                                key:
                                  description: The key to select.
                                  type: string
                                name:
                                  default: ""
                                  description: |-
                                    Name of the referent.
                                    This field is effectively required, but due to backwards compatibility is
                                    allowed to be empty. Instances of this type with an empty value here are
                                    almost certainly wrong.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                                optional:
                                  description: Specify whether the ConfigMap or its
                                    key must be defined
                                  type: boolean
                              required:
                              - key
                              type: object
                              x-kubernetes-map-type: atomic
                            fieldRef:
                              description: |-
                                Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                                spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                              properties:
                                apiVersion:
                                  description: Version of the schema the FieldPath
                                    is written in terms of, defaults to "v1".
                                  type: string
                                fieldPath:
                                  description: Path of the field to select in the
                                    specified API version.
                                  type: string
                              required:
                              - fieldPath
                              type: object
                              x-kubernetes-map-type: atomic
                            fileKeyRef:
                              description: |-
                                FileKeyRef selects a key of the env file.
                                Requires the EnvFiles feature gate to be enabled.
                              properties:
                                key:
                                  description: |-
                                    The key within the env file. An invalid key will prevent the pod from starting.
                                    The keys defined within a source may consist of any printable ASCII characters except '='.
                                    During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
                                  type: string
                                optional:
                                  default: false
                                  description: |-
                                    Specify whether the file or its key must be defined. If the file or key
                                    does not exist, then the env var is not published.
                                    If optional is set to true and the specified key does not exist,
                                    the environment variable will not be set in the Pod's containers.

                                    If optional is set to false and the specified key does not exist,
                                    an error will be returned during Pod creation.
                                  type: boolean
                                path:
                                  description: |-
                                    The path within the volume from which to select the file.
                                    Must be relative and may not contain the '..' path or start with '..'.
                                  type: string
                                volumeName:
                                  description: The name of the volume mount containing
                                    the env file.
                                  type: string
                              required:
                              - key
                              - path
                              - volumeName
                              type: object
                              x-kubernetes-map-type: atomic
                            resourceFieldRef:
                              description: |-
                                Selects a resource of the container: only resources limits and requests
                                (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
                              properties:
                                containerName:
                                  description: 'Container name: required for volumes,
                                    optional for env vars'
                                  type: string
                                divisor:
                                  anyOf:
                                  - type: integer
                                  - type: string
                                  description: Specifies the output format of the
                                    exposed resources, defaults to "1"
                                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                  x-kubernetes-int-or-string: true
                                resource:
                                  description: 'Required: resource to select'
                                  type: string
                              required:
                              - resource
                              type: object
                              x-kubernetes-map-type: atomic
                            secretKeyRef:
                              description: Selects a key of a secret in the pod's
                                namespace
                              properties:
                                key:
                                  description: The key of the secret to select from.  Must
                                    be a valid secret key.
                                  type: string
                                name:
                                  default: ""
                                  description: |-
                                    Name of the referent.
                                    This field is effectively required, but due to backwards compatibility is
                                    allowed to be empty. Instances of this type with an empty value here are
                                    almost certainly wrong.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                                optional:
                                  description: Specify whether the Secret or its key
                                    must be defined
                                  type: boolean
                              required:
                              - key
                              type: object
                              x-kubernetes-map-type: atomic
                          type: object
                      required:
                      - name
                      type: object
                    type: array
                  keepAlive:
                    description: KeepAlive prevents idle scale-down when scale-to-zero
                      is enabled.
                    type: boolean
                  replicas:
                    default: 1
                    format: int32
                    minimum: 0
                    type: integer
                  resources:
                    description: ResourceRequirements describes the compute resource
                      requirements.
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                type: object
              source:
                description: AppSource declares where the app's code (and environment)
                  comes from.
                properties:
                  git:
                    description: GitSource references app content in a git repository.
                    properties:
                      ref:
                        default: main
                        description: Ref is the branch, tag, or commit to check out.
                        type: string
                      subdir:
                        description: Subdir is the path within the repository containing
                          the content root.
                        type: string
                      url:
                        description: URL of the git repository (https).
                        minLength: 1
                        type: string
                    required:
                    - url
                    type: object
                  image:
                    description: ImageSource references a prebuilt, self-contained
                      container image.
                    properties:
                      repository:
                        minLength: 1
                        type: string
                      tag:
                        default: latest
                        type: string
                    required:
                    - repository
                    type: object
                  inline:
                    description: InlineSource carries small static content directly
                      in the CR.
                    properties:
                      files:
                        additionalProperties:
                          type: string
                        description: Files maps relative file paths to their contents.
                        minProperties: 1
                        type: object
                    required:
                    - files
                    type: object
                  ociEnv:
                    description: |-
                      OCIEnvSource runs Python app code inside a Nebi-published pixi environment
                      delivered as an OCI artifact.
                    properties:
                      code:
                        description: Code says where the app code lives (env != code).
                        properties:
                          git:
                            description: GitSource references app content in a git
                              repository.
                            properties:
                              ref:
                                default: main
                                description: Ref is the branch, tag, or commit to
                                  check out.
                                type: string
                              subdir:
                                description: Subdir is the path within the repository
                                  containing the content root.
                                type: string
                              url:
                                description: URL of the git repository (https).
                                minLength: 1
                                type: string
                            required:
                            - url
                            type: object
                          pvc:
                            description: PVCSource references content already present
                              on a PersistentVolumeClaim.
                            properties:
                              claimName:
                                minLength: 1
                                type: string
                              subPath:
                                description: SubPath within the volume containing
                                  the content root.
                                type: string
                            required:
                            - claimName
                            type: object
                          type:
                            enum:
                            - git
                            - pvc
                            type: string
                        required:
                        - type
                        type: object
                      entrypoint:
                        description: Entrypoint is the app entrypoint relative to
                          the code root.
                        minLength: 1
                        type: string
                      ref:
                        description: Ref is the OCI reference of the published pixi
                          environment.
                        minLength: 1
                        type: string
                    required:
                    - code
                    - entrypoint
                    - ref
                    type: object
                  pvc:
                    description: PVCSource references content already present on a
                      PersistentVolumeClaim.
                    properties:
                      claimName:
                        minLength: 1
                        type: string
                      subPath:
                        description: SubPath within the volume containing the content
                          root.
                        type: string
                    required:
                    - claimName
                    type: object
                  type:
                    description: SourceType identifies where an app's code (and environment)
                      comes from.
                    enum:
                    - ociEnv
                    - image
                    - git
                    - inline
                    - pvc
                    type: string
                required:
                - type
                type: object
              thumbnail:
                description: Thumbnail as a data URI, shown in catalogs and the landing
                  page.
                type: string
            required:
            - access
            - displayName
            - framework
            - source
            type: object
          status:
            description: AppStatus defines the observed state of an App.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              message:
                description: Message is a human-readable summary of the current state.
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: AppPhase is a coarse summary of app state.
                enum:
                - Pending
                - Building
                - Deploying
                - Running
                - Failed
                - Stopped
                type: string
              replicas:
                description: AppReplicas reports desired vs ready replica counts.
                properties:
                  desired:
                    format: int32
                    type: integer
                  ready:
                    format: int32
                    type: integer
                required:
                - desired
                - ready
                type: object
              url:
                description: URL where the app is reachable once routing is ready.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
